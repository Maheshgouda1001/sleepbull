name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck
        env:
          DATABASE_URL: postgresql://sleepbull:sleepbull_password@localhost:5432/sleepbull?schema=public
          JWT_ACCESS_SECRET: ci-secret-key-should-be-long-enough

      - name: Lint
        run: npm run lint
        env:
          DATABASE_URL: postgresql://sleepbull:sleepbull_password@localhost:5432/sleepbull?schema=public
          JWT_ACCESS_SECRET: ci-secret-key-should-be-long-enough

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://sleepbull:sleepbull_password@localhost:5432/sleepbull?schema=public
          JWT_ACCESS_SECRET: ci-secret-key-should-be-long-enough

      - name: Run tests
        run: npm test
