version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sleepbull-postgres
    environment:
      POSTGRES_DB: sleepbull
      POSTGRES_USER: sleepbull
      POSTGRES_PASSWORD: sleepbull_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sleepbull -d sleepbull']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sleepbull-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '4000:4000'
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
